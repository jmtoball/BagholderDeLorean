app = "bagholder"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  DATA_DIR = "/data"

[mounts]
  source = "bagholder_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  auto_stop_machines = "stop"
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/universe"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
