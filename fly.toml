app = "bagholder"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  DATA_DIR = "/data"

[mounts]
  source = "bagholder_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  # The app self-stops when idle (a clean exit, gated on no in-flight backfill), so
  # Fly shouldn't also stop it; autostart revives the Machine on the next request
  # and it scales to zero. A periodic http check would keep it from ever idling, so
  # there's none — health is "the process is up while it's serving".
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
